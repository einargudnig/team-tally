<!--
  Open Graph social preview — 1200x630.
  Rendered once to apps/web/public/og.png via `bun run icons`.
  Uses system fonts (Helvetica Neue on macOS) for clean render without
  needing to bundle a web font.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Amber glow in the upper-right quadrant so the chip feels lit -->
    <radialGradient id="glow" cx="78%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#f59e0b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base canvas -->
  <rect width="1200" height="630" fill="#0f0f14"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent stripe — brand signature -->
  <rect x="0" y="0" width="1200" height="5" fill="#f59e0b"/>

  <!-- ============ LEFT: TEXT BLOCK ============ -->

  <!-- "Launching soon" pill badge -->
  <g>
    <rect
      x="80" y="118" width="232" height="40" rx="20"
      fill="#1a1a24"
      stroke="#f59e0b"
      stroke-opacity="0.35"
      stroke-width="1.5"
    />
    <circle cx="102" cy="138" r="4.5" fill="#f59e0b"/>
    <text
      x="120" y="138"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="14"
      font-weight="700"
      fill="#f59e0b"
      dominant-baseline="central"
      letter-spacing="1.8"
    >LAUNCHING SOON</text>
  </g>

  <!-- Headline — two lines, second line ends in amber accent -->
  <g font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="800" fill="#f5f5f5">
    <text x="80" y="238" font-size="74" letter-spacing="-2.5">The fine tracker</text>
    <text x="80" y="322" font-size="74" letter-spacing="-2.5">
      for <tspan fill="#f59e0b">football teams</tspan>.
    </text>
  </g>

  <!-- Tagline -->
  <text
    x="80" y="420"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="26"
    font-weight="500"
    fill="#9ca3af"
    letter-spacing="-0.2"
  >Track fines. Settle the kitty. Crown the leaderboard.</text>

  <!-- URL — bottom-left -->
  <text
    x="80" y="545"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="600"
    fill="#f59e0b"
    letter-spacing="0.8"
  >team-tally.app</text>

  <!-- ============ RIGHT: CHIP LOGO ============ -->

  <!-- Scaled from 32x32 viewBox to 300px chip, translated into position.
       Translate = desired_top_left - scale * 2  (because chip starts at (2,2))
       Scale 10.7 → chip ~300px; translate (820, 144) centers it vertically. -->
  <g transform="translate(820 144) scale(10.7)">
    <rect x="2" y="2" width="28" height="28" rx="7" fill="#f59e0b"/>
    <rect x="5.5" y="10" width="21" height="2.5" rx="1" fill="#0f0f14"/>
    <rect x="8.1" y="12.5" width="1.8" height="8" rx="0.9" fill="#0f0f14"/>
    <rect x="11.6" y="12.5" width="1.8" height="11" rx="0.9" fill="#0f0f14"/>
    <rect x="15.1" y="12.5" width="1.8" height="14" rx="0.9" fill="#0f0f14"/>
    <rect x="18.6" y="12.5" width="1.8" height="11" rx="0.9" fill="#0f0f14"/>
    <rect x="22.1" y="12.5" width="1.8" height="8" rx="0.9" fill="#0f0f14"/>
  </g>
</svg>
